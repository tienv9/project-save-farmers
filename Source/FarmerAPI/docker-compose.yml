services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: FarmerAPI
      POSTGRES_USER: farmer
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmer -d FarmerAPI"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=FarmerAPI;Username=farmer;Password=${DB_PASSWORD}"
      JwtSettings__Issuer: "${JWT_ISSUER}"
      JwtSettings__Audience: "${JWT_AUDIENCE}"
      JwtSettings__Key: "${JWT_KEY}"
      JwtSettings__expires: "${JWT_EXPIRES:-10000000}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  wordle-api:
    build:
      context: ../../../Wordle-Game-NYT/Wordle.Api
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://0.0.0.0:5001"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=WordleDB;Username=farmer;Password=${DB_PASSWORD}"
      Jwt__Issuer: "${WORDLE_JWT_ISSUER}"
      Jwt__Audience: "${WORDLE_JWT_AUDIENCE}"
      Jwt__Secret: "${WORDLE_JWT_SECRET}"
      Jwt__ExpirationInMinutes: "${WORDLE_JWT_EXPIRES:-60}"
      UseSwagger: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - wordle-api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
